// ── AUTH ───────────────────────────────────────────────────────
async function initAuth() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    currentUser = session.user;
    showApp();
    await loadData();
  }
  // listen for auth changes
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session) {
      currentUser = session.user;
      showApp();
      await loadData();
    } else if (event === 'SIGNED_OUT') {
      currentUser = null;
      DATA = {partners:[], kinks:{}};
      dbRecordId = null;
      showLogin();
    }
  });
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

document.getElementById('login-btn').addEventListener('click', async () => {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-err');
  const loadEl = document.getElementById('login-loading');
  errEl.textContent = '';
  if (!email || !password) { errEl.textContent = 'Please enter your email and password.'; return; }
  document.getElementById('login-btn').style.display = 'none';
  loadEl.style.display = 'block';
  const { error } = await sb.auth.signInWithPassword({ email, password });
  loadEl.style.display = 'none';
  document.getElementById('login-btn').style.display = 'block';
  if (error) { errEl.textContent = error.message; }
});

// allow pressing Enter in password field to submit
document.getElementById('login-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-btn').click();
});

document.getElementById('logout-btn').addEventListener('click', async () => {
  await sb.auth.signOut();
});

// ── DATA LAYER (Supabase) ──────────────────────────────────────
function showSync(msg) {
  const bar = document.getElementById('sync-bar');
  bar.textContent = msg;
  bar.classList.add('show');
}
function hideSync() {
  document.getElementById('sync-bar').classList.remove('show');
}

async function loadData() {
  if (!currentUser) return;
  showSync('loading your data...');
  try {
    const { data, error } = await sb
      .from('entries')
      .select('*')
      .eq('user_id', currentUser.id)
      .limit(1)
      .maybeSingle();
    if (error) throw error;
    if (data) {
      dbRecordId = data.id;
      DATA = data.payload || {partners:[], kinks:{}};
    } else {
      dbRecordId = null;
      DATA = {partners:[], kinks:{}};
    }
  } catch(e) {
    console.error('Load error:', e);
  }
  hideSync();
  render();
}

async function saveData() {
  if (!currentUser) return;
  showSync('saving...');
  try {
    if (dbRecordId) {
      const { error } = await sb
        .from('entries')
        .update({ payload: DATA })
        .eq('id', dbRecordId)
        .eq('user_id', currentUser.id);
      if (error) throw error;
    } else {
      const { data, error } = await sb
        .from('entries')
        .insert({ user_id: currentUser.id, payload: DATA })
        .select()
        .single();
      if (error) throw error;
      dbRecordId = data.id;
    }
  } catch(e) {
    console.error('Save error:', e);
  }
  hideSync();
}

// ── HELPERS ────────────────────────────────────────────────────
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function slugify(cat,item){return cat+'::'+item}
function statusClass(s){return STATUS_CLASS[s]||'s-not-tried'}

function getLatestEntry(kinkId){
  const entries = DATA.kinks[kinkId];
  if(!entries||!entries.length) return null;
  return [...entries].sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
}

function allPartnersOnKink(kinkId){
  const entries = DATA.kinks[kinkId]||[];
  const set = new Set();
  entries.forEach(e=>(e.partners||[]).forEach(p=>set.add(p)));
  return [...set];
}

// ── STATS ──────────────────────────────────────────────────────
function updateStats(){
  let logs=0,tried=0,curious=0,soft=0,hard=0;
  let total = CATS.reduce((a,c)=>a+c.items.length,0);
  Object.values(DATA.kinks).forEach(entries=>{
    logs+=entries.length;
    const latest = [...entries].sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
    if(!latest) return;
    if(latest.status==='Tried — Liked'||latest.status==='Tried — Disliked') tried++;
    if(latest.status==='Curious') curious++;
    if(latest.status==='Soft Limit') soft++;
    if(latest.status==='Hard Limit') hard++;
  });
  document.getElementById('s-total').textContent=total;
  document.getElementById('s-logs').textContent=logs;
  document.getElementById('s-tried').textContent=tried;
  document.getElementById('s-curious').textContent=curious;
  document.getElementById('s-soft').textContent=soft;
  document.getElementById('s-hard').textContent=hard;
  document.getElementById('s-partners').textContent=DATA.partners.length;
}

function updatePartnerFilter(){
  const sel = document.getElementById('filter-partner');
  const cur = sel.value;
  sel.innerHTML='<option value="">All partners</option>';
  DATA.partners.forEach(p=>{
    const o=document.createElement('option');
    o.value=p;o.textContent=p;
    if(p===cur) o.selected=true;
    sel.appendChild(o);
  });
}

function getFilters(){
  return{
    q:document.getElementById('search').value.toLowerCase(),
    status:document.getElementById('filter-status').value,
    partner:document.getElementById('filter-partner').value
  };
}

function kinkVisible(kinkId, itemName, filters){
  if(filters.q && !itemName.toLowerCase().includes(filters.q)) return false;
  const latest = getLatestEntry(kinkId);
  if(filters.status==='has-entries'){
    if(!DATA.kinks[kinkId]||!DATA.kinks[kinkId].length) return false;
  } else if(filters.status){
    if(!latest||latest.status!==filters.status) return false;
  }
  if(filters.partner){
    const partners = allPartnersOnKink(kinkId);
    if(!partners.includes(filters.partner)) return false;
  }
  return true;
}

// ── RENDER ─────────────────────────────────────────────────────
function render(){
  updateStats();
  updatePartnerFilter();
  const filters = getFilters();
  const main = document.getElementById('main');
  main.innerHTML='';

  CATS.forEach(cat=>{
    const visibleItems = cat.items.filter(item=>kinkVisible(slugify(cat.id,item),item,filters));
    if(filters.q||filters.status||filters.partner){
      if(!visibleItems.length) return;
    }
    const loggedCount = cat.items.filter(item=>{
      const id=slugify(cat.id,item);
      return DATA.kinks[id]&&DATA.kinks[id].length>0;
    }).length;

    const card = document.createElement('div');
    card.className='cat-card';
    card.style.borderLeftColor=cat.color;

    const isCollapsed = collapsed[cat.id];
    card.innerHTML=`<div class="cat-header" data-cat="${cat.id}">
      <span class="cat-name" style="color:${cat.color}">${cat.name}</span>
      <span class="cat-counter">${loggedCount}/${cat.items.length}</span>
      <span class="cat-toggle">${isCollapsed?'▸':'▾'}</span>
    </div>
    <div class="cat-body" style="${isCollapsed?'display:none':''}"></div>`;

    const body = card.querySelector('.cat-body');
    const itemsToShow = (filters.q||filters.status||filters.partner) ? visibleItems : cat.items;
    itemsToShow.forEach(item=>{
      const kinkId = slugify(cat.id,item);
      const latest = getLatestEntry(kinkId);
      const entries = DATA.kinks[kinkId]||[];
      const partners = allPartnersOnKink(kinkId);
      const hasNotes = entries.some(e=>(e.notes&&e.notes.trim())||(e.feelings&&e.feelings.trim()));

      const row = document.createElement('div');
      row.className='kink-row';
      row.dataset.kink=kinkId;
      row.dataset.catname=cat.name;
      row.dataset.catcolor=cat.color;
      row.dataset.itemname=item;

      let pHtml = partners.map(p=>`<span class="partner-pill-sm">${escH(p)}</span>`).join('');
      let badges = '';
      if(hasNotes) badges+=`<span class="badge badge-notes">notes</span>`;
      if(entries.length>1) badges+=`<span class="badge badge-count">${entries.length}x</span>`;
      const statusHtml = latest ? `<span class="status-chip ${statusClass(latest.status)}">${latest.status}</span>` : '';

      row.innerHTML=`<span class="kink-name${latest?' logged':''}">${escH(item)}</span>
        <span class="kink-row-pills">${pHtml}</span>
        ${badges}${statusHtml}`;
      body.appendChild(row);
    });

    card.querySelector('.cat-header').addEventListener('click',()=>{
      collapsed[cat.id]=!collapsed[cat.id];
      const b=card.querySelector('.cat-body');
      const t=card.querySelector('.cat-toggle');
      b.style.display=collapsed[cat.id]?'none':'';
      t.textContent=collapsed[cat.id]?'▸':'▾';
    });

    main.appendChild(card);
  });

  main.querySelectorAll('.kink-row').forEach(row=>{
    row.addEventListener('click',()=>openDrawer(row.dataset.kink,row.dataset.itemname,row.dataset.catname,row.dataset.catcolor));
  });
}

// ── DRAWER ─────────────────────────────────────────────────────
function openDrawer(kinkId, name, catName, catColor){
  currentKinkId=kinkId;
  tempPartners=[];
  document.getElementById('drawer-title').textContent=name;
  document.getElementById('drawer-cat').textContent=catName;
  document.getElementById('drawer-cat').style.color=catColor;
  renderEntries();
  renderPartnerMgr();
  const form=document.getElementById('new-entry-form');
  form.classList.remove('show');
  document.getElementById('btn-show-form').style.display='';
  const today=new Date().toISOString().slice(0,10);
  document.getElementById('f-date').value=today;
  document.getElementById('f-status').value='Not Tried';
  document.getElementById('f-notes').value='';
  document.getElementById('f-feelings').value='';
  renderTagPills();
  document.getElementById('drawer-overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}

function closeDrawer(){
  document.getElementById('drawer-overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
  currentKinkId=null;
}

function renderEntries(){
  const list=document.getElementById('entries-list');
  const entries=(DATA.kinks[currentKinkId]||[]).slice().sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(!entries.length){list.innerHTML='<div class="no-entries">No entries yet — log your first below.</div>';return;}
  list.innerHTML=entries.map((e,i)=>`
    <div class="entry-card">
      <div class="entry-meta">
        <span class="status-chip ${statusClass(e.status)}">${escH(e.status)}</span>
        <span class="entry-date">${escH(e.date)}</span>
        <span class="entry-partners">${(e.partners||[]).map(p=>`<span class="partner-pill-sm">${escH(p)}</span>`).join('')}</span>
      </div>
      ${e.notes?`<div class="entry-field"><div class="entry-field-lbl">Notes</div><div class="entry-field-val">${escH(e.notes)}</div></div>`:''}
      ${e.feelings?`<div class="entry-field"><div class="entry-field-lbl">Feelings</div><div class="entry-field-val">${escH(e.feelings)}</div></div>`:''}
    </div>`).join('');
}

function renderPartnerMgr(){
  const mgr=document.getElementById('partner-mgr');
  if(!DATA.partners.length){mgr.innerHTML='<span style="font-size:11px;color:var(--text3)">No partners yet</span>';return;}
  mgr.innerHTML=DATA.partners.map(p=>`<span class="partner-global-pill">${escH(p)}<span class="rm" data-p="${escH(p)}">×</span></span>`).join('');
  mgr.querySelectorAll('.rm').forEach(el=>{
    el.addEventListener('click',()=>{
      DATA.partners=DATA.partners.filter(x=>x!==el.dataset.p);
      saveData();renderPartnerMgr();updatePartnerFilter();
    });
  });
}

function renderTagPills(){
  const wrap=document.getElementById('tag-pills');
  wrap.innerHTML=tempPartners.map(p=>`<span class="partner-pill-tag">${escH(p)}<span class="rm" data-p="${escH(p)}">×</span></span>`).join('');
  wrap.querySelectorAll('.rm').forEach(el=>{
    el.addEventListener('click',()=>{tempPartners=tempPartners.filter(x=>x!==el.dataset.p);renderTagPills();});
  });
}

// ── PARTNER AUTOCOMPLETE ───────────────────────────────────────
const partnerInput=document.getElementById('f-partner');
const sugDiv=document.getElementById('partner-suggestions');
partnerInput.addEventListener('input',()=>{
  const q=partnerInput.value.trim().toLowerCase();
  if(!q){sugDiv.style.display='none';return;}
  const matches=DATA.partners.filter(p=>p.toLowerCase().includes(q)&&!tempPartners.includes(p));
  if(!matches.length){sugDiv.style.display='none';return;}
  sugDiv.innerHTML=matches.map(p=>`<div class="partner-sug" data-p="${escH(p)}">${escH(p)}</div>`).join('');
  sugDiv.style.display='block';
  sugDiv.querySelectorAll('.partner-sug').forEach(el=>{
    el.addEventListener('click',()=>{
      addTempPartner(el.dataset.p);
      partnerInput.value='';sugDiv.style.display='none';
    });
  });
});
partnerInput.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    e.preventDefault();
    const v=partnerInput.value.trim();
    if(v){addTempPartner(v);partnerInput.value='';sugDiv.style.display='none';}
  }
});
partnerInput.addEventListener('blur',()=>{
  setTimeout(()=>{
    if(document.activeElement&&document.activeElement.closest('#partner-suggestions')) return;
    const v=partnerInput.value.trim();
    if(v){addTempPartner(v);partnerInput.value='';sugDiv.style.display='none';}
  },150);
});
function addTempPartner(p){
  if(!tempPartners.includes(p)) tempPartners.push(p);
  if(!DATA.partners.includes(p)){DATA.partners.push(p);saveData();updatePartnerFilter();}
  renderTagPills();
}

// ── FORM ACTIONS ───────────────────────────────────────────────
document.getElementById('btn-show-form').addEventListener('click',()=>{
  document.getElementById('new-entry-form').classList.add('show');
  document.getElementById('btn-show-form').style.display='none';
});
document.getElementById('btn-cancel').addEventListener('click',()=>{
  document.getElementById('new-entry-form').classList.remove('show');
  document.getElementById('btn-show-form').style.display='';
});

document.getElementById('btn-save-entry').addEventListener('click', async ()=>{
  const btn = document.getElementById('btn-save-entry');
  btn.disabled = true;
  btn.textContent = 'Saving...';
  const entry={
    date:document.getElementById('f-date').value||new Date().toISOString().slice(0,10),
    status:document.getElementById('f-status').value,
    partners:[...tempPartners],
    notes:document.getElementById('f-notes').value.trim(),
    feelings:document.getElementById('f-feelings').value.trim()
  };
  if(!DATA.kinks[currentKinkId]) DATA.kinks[currentKinkId]=[];
  DATA.kinks[currentKinkId].push(entry);
  await saveData();
  renderEntries();
  document.getElementById('new-entry-form').classList.remove('show');
  document.getElementById('btn-show-form').style.display='';
  tempPartners=[];
  renderTagPills();
  render();
  btn.disabled = false;
  btn.textContent = 'Save entry';
});

document.getElementById('drawer-overlay').addEventListener('click',closeDrawer);
document.getElementById('search').addEventListener('input',render);
document.getElementById('filter-status').addEventListener('change',render);
document.getElementById('filter-partner').addEventListener('change',render);
document.getElementById('expand-all').addEventListener('click',()=>{CATS.forEach(c=>collapsed[c.id]=false);render();});
document.getElementById('collapse-all').addEventListener('click',()=>{CATS.forEach(c=>collapsed[c.id]=true);render();});

// ── EXPORT BACKUP ──────────────────────────────────────────────
document.getElementById('btn-export').addEventListener('click',()=>{
  const blob=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='kink-journal-backup.json';
  a.click();
});

// ── BOOT ───────────────────────────────────────────────────────
initAuth();
</script>
</body>
